name: Update Financial Dashboard

on:
  # Daily at 6:00 AM IST (00:30 UTC)
  schedule:
    - cron: '30 0 * * *'

  # Manual trigger for testing — runs without waiting for cron
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (parse but do not commit)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write   # needed to commit updated data/ files back

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      # ── 3. Fetch emails from Gmail ─────────────────────────────────────────
      - name: Fetch emails from Gmail
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          cd pipeline
          python fetch_emails.py
          echo "fetch_emails completed"

      # ── 4. Parse transactions ──────────────────────────────────────────────
      - name: Parse transactions
        run: |
          cd pipeline
          python parse_transactions.py
          echo "parse_transactions completed"
          # Log parse error count for visibility
          if [ -f "../data/parse_errors.json" ]; then
            COUNT=$(python -c "import json; d=json.load(open('../data/parse_errors.json')); print(len(d))")
            echo "Parse errors logged: $COUNT"
            if [ "$COUNT" -gt "10" ]; then
              echo "::warning::High parse error count: $COUNT. Review data/parse_errors.json"
            fi
          fi

      # ── 5. Generate AI insights ────────────────────────────────────────────
      - name: Generate spending insights
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd pipeline
          python generate_insights.py
          echo "generate_insights completed"

      # ── 6. Update last_updated.json ────────────────────────────────────────
      - name: Update run metadata
        run: |
          python - <<'EOF'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path

          data_dir = Path("data")
          txns = json.loads((data_dir / "transactions.json").read_text())
          errors = []
          if (data_dir / "parse_errors.json").exists():
              errors = json.loads((data_dir / "parse_errors.json").read_text())

          meta = {
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "emails_fetched": int(os.environ.get("EMAILS_FETCHED", "0")),
              "transactions_added": len(txns),
              "parse_errors": len(errors),
              "pipeline_version": "1.0.0",
          }
          (data_dir / "last_updated.json").write_text(json.dumps(meta, indent=2))
          print(f"Metadata written: {meta}")
          EOF

      # ── 7. Sync data/ → public/data/ (what Vercel actually serves) ───────────
      - name: Sync data to public/data
        run: |
          cp data/transactions.json public/data/transactions.json
          cp data/insights.json     public/data/insights.json
          cp data/last_updated.json public/data/last_updated.json
          echo "Synced data/ to public/data/"

      # ── 8. Commit updated data ─────────────────────────────────────────────
      - name: Commit updated data files
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "FinDash Pipeline"
          git config user.email "pipeline@findash.app"
          git add data/transactions.json data/accounts.json data/credit_cards.json \
                  data/insights.json data/last_updated.json \
                  public/data/transactions.json public/data/insights.json \
                  public/data/last_updated.json

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "data: pipeline update ${TIMESTAMP}

          Auto-generated by GitHub Actions.
          Pipeline: fetch_emails -> parse_transactions -> generate_insights"
            git push
            echo "Data committed and pushed."
          fi

      # ── 9. Dry run summary ─────────────────────────────────────────────────
      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN — no commit made ==="
          python - <<'EOF'
          import json
          from pathlib import Path
          txns = json.loads(Path("data/transactions.json").read_text())
          insights = json.loads(Path("data/insights.json").read_text())
          print(f"Transactions total: {len(txns)}")
          print(f"Insights alerts: {len(insights.get('alerts', []))}")
          print(f"Insights tips: {len(insights.get('tips', []))}")
          EOF
